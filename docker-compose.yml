services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PGDATABASE:-pos_db}
      POSTGRES_USER: ${PGUSER:-pos_user}
      POSTGRES_PASSWORD: ${PGPASSWORD:-pos_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-pos_user} -d ${PGDATABASE:-pos_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: ${PGDATABASE:-pos_db}
      PGUSER: ${PGUSER:-pos_user}
      PGPASSWORD: ${PGPASSWORD:-pos_pass}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
